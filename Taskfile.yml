version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install dependencies
    cmds:
      - bun install

  dev:
    desc: Start collab server and Vite development server
    deps:
      - collab:server
      - dev:web

  dev:web:
    desc: Start only the Vite development server
    deps: [install]
    cmds:
      - bun run dev -- --open

  collab:server:
    desc: Start the Go collaboration server (SSE + file persistence)
    cmds:
      - go run . --addr :8090 --data-dir ./data

  build:
    desc: Build the embedded web app and Chirone binary
    deps: [build:web]
    cmds:
      - go build -o ./chirone .

  build:web:
    desc: Build the web app for embedding
    cmds:
      - bun run build

  preview:
    desc: Preview the production web build
    deps: [build:web]
    cmds:
      - bun run preview

  check:
    desc: Run type and Svelte checks
    cmds:
      - bun run check

  lint:
    desc: Run formatting and lint checks
    cmds:
      - bun run lint

  format:
    desc: Format the codebase
    cmds:
      - bun run format

  test:
    desc: Run unit and integration tests
    cmds:
      - bun run test

  test:unit:
    desc: Run unit tests
    cmds:
      - bun run test:unit

  test:integration:
    desc: Run integration tests
    cmds:
      - bun run test:integration

  ci:
    desc: Run the CI-equivalent local checks
    cmds:
      - task: check
      - task: lint
      - task: test

  docker:build:
    desc: Build Docker image (embedded UI + Chirone server)
    cmds:
      - docker build --build-arg PUBLIC_CHIRONE_BASE_PATH=${BUILD_CHIRONE_BASE_PATH:-} --build-arg PUBLIC_CHIRONE_SYNC_API_BASE=${BUILD_CHIRONE_SYNC_API_BASE:-/} --build-arg PUBLIC_CHIRONE_ALLOW_SYNC_API_BASE_OVERRIDE=${BUILD_CHIRONE_ALLOW_SYNC_API_BASE_OVERRIDE:-false} --build-arg PUBLIC_CHIRONE_SYNC_PROJECT=${BUILD_CHIRONE_SYNC_PROJECT:-default} -t ${IMAGE:-chirone}:${TAG:-latest} .

  docker:run:
    desc: Run Docker image on localhost:8080 with persistent data volume
    deps: [docker:build]
    cmds:
      - docker run --rm -e PORT=${PORT:-8080} -p ${PORT:-8080}:${PORT:-8080} -v ${VOLUME:-chirone-data}:/app/data ${IMAGE:-chirone}:${TAG:-latest}

  docker:tag:ghcr:
    desc: Tag local image for GHCR
    cmds:
      - docker tag ${IMAGE:-chirone}:${TAG:-latest} ghcr.io/${OWNER}/${IMAGE:-chirone}:${TAG:-latest}

  docker:push:ghcr:
    desc: Push image to GHCR
    deps: [docker:tag:ghcr]
    cmds:
      - docker push ghcr.io/${OWNER}/${IMAGE:-chirone}:${TAG:-latest}
