services:
  chirone:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_CHIRONE_BASE_PATH: ${BUILD_CHIRONE_BASE_PATH:-}
        PUBLIC_CHIRONE_SYNC_API_BASE: ${BUILD_CHIRONE_SYNC_API_BASE:-/}
        PUBLIC_CHIRONE_ALLOW_SYNC_API_BASE_OVERRIDE: ${BUILD_CHIRONE_ALLOW_SYNC_API_BASE_OVERRIDE:-false}
        PUBLIC_CHIRONE_SYNC_PROJECT: ${BUILD_CHIRONE_SYNC_PROJECT:-default}
    image: "${IMAGE:-chirone}:${TAG:-latest}"
    environment:
      - PORT=${PORT:-8080}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - "${VOLUME:-chirone-data}:/app/data"
    restart: unless-stopped

volumes:
  chirone-data:
